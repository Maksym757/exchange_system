<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reset Password</title><style>:root{--card:#fff;--accent:#c54a2d;--accent-dark:#9a3821;--text:#1b2430;--muted:#5d6773;--shadow:rgba(29,40,59,.12)}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#fff6e9,#e5eef2);font-family:"Trebuchet MS","Lucida Sans Unicode","Lucida Grande",sans-serif;color:var(--text)}.page{min-height:calc(100vh - 70px);display:grid;place-items:center;padding:32px 24px 48px;box-sizing:border-box}.container{width:min(520px,100%);background:var(--card);border-radius:16px;padding:28px;box-shadow:0 12px 28px var(--shadow)}h1,.subtitle{text-align:center}.subtitle{color:var(--muted);margin:0 0 20px}.message{margin-bottom:14px;padding:10px 12px;border-radius:10px;font-weight:600}.message.error{background:#ffe4e4;color:#9f1f1f}.message.success{background:#dff7f4;color:#0c5c56}label{display:block;margin:10px 0 6px;font-weight:700}input{width:100%;border:1px solid #e1e4ea;border-radius:8px;padding:10px;box-sizing:border-box;background:#fff}button{width:100%;margin-top:14px;border:none;border-radius:8px;padding:12px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff}button:hover{background:var(--accent-dark)}.links{margin-top:16px;text-align:center}.links a{color:var(--accent-dark);font-weight:700;text-decoration:none}</style></head>
<body>{% include "includes/shared_headers.html" %}<div class="page"><div class="container"><h1 id="reset-title">Reset Password</h1><p class="subtitle" id="reset-subtitle">Enter your email address and we will send you a link to restore access.</p>{% if error_message %}<div class="message error" id="reset-error">{{ error_message }}</div>{% endif %}{% if success_message %}<div class="message success" id="reset-success">{{ success_message }}</div>{% endif %}<form method="post" action="/admin-panel/password-reset/">{% csrf_token %}<label for="reset-email" id="reset-email-label">Email</label><input id="reset-email" type="email" name="email" value="{{ email }}" placeholder="name@example.com" required><button type="submit" id="reset-submit">Send reset link</button></form><div class="links"><a href="/admin-panel/" id="reset-back">Back to administrator access</a></div></div></div>
<script>(function(){const errorNode=document.getElementById('reset-error');const successNode=document.getElementById('reset-success');const errorMap={'Please enter a valid email address.':'Вкажіть коректну email-адресу.'};const successMap={'If this email address exists in the system, a reset link has already been sent.':'Якщо ця email-адреса існує в системі, посилання для скидання вже надіслано.'};const copy={en:{doc:'Reset Password',title:'Reset Password',subtitle:'Enter your email address and we will send you a link to restore access.',email:'Email',submit:'Send reset link',back:'Back to administrator access'},uk:{doc:'Скидання пароля',title:'Скидання пароля',subtitle:'Вкажіть email-адресу, і ми надішлемо посилання для відновлення доступу.',email:'Email',submit:'Надіслати посилання',back:'Назад до доступу адміністратора'}};function applyLanguage(lang){const l=lang==='uk'?'uk':'en';document.title=copy[l].doc;document.getElementById('reset-title').textContent=copy[l].title;document.getElementById('reset-subtitle').textContent=copy[l].subtitle;document.getElementById('reset-email-label').textContent=copy[l].email;document.getElementById('reset-submit').textContent=copy[l].submit;document.getElementById('reset-back').textContent=copy[l].back;if(errorNode){const en=errorNode.dataset.enText||errorNode.textContent.trim();errorNode.dataset.enText=en;errorNode.textContent=l==='uk'?(errorMap[en]||en):en;}if(successNode){const en=successNode.dataset.enText||successNode.textContent.trim();successNode.dataset.enText=en;successNode.textContent=l==='uk'?(successMap[en]||en):en;}}document.addEventListener('site-language-change',(e)=>applyLanguage(e.detail.language));applyLanguage(window.siteUiLanguage||document.documentElement.dataset.uiLang||'en');})();</script></body></html>
