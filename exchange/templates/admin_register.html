<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Create Administrator Account</title><style>:root{--card:#fff;--accent:#c54a2d;--accent-dark:#9a3821;--text:#1b2430;--muted:#5d6773;--shadow:rgba(29,40,59,.12);--line:#e1e4ea}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#fff6e9,#e5eef2);font-family:"Trebuchet MS","Lucida Sans Unicode","Lucida Grande",sans-serif;color:var(--text)}.page{min-height:calc(100vh - 70px);display:grid;place-items:center;padding:32px 24px 48px;box-sizing:border-box}.container{width:min(520px,100%);background:var(--card);border-radius:16px;padding:28px;box-shadow:0 12px 28px var(--shadow)}h1,.subtitle{text-align:center}.subtitle{color:var(--muted);margin:0 0 20px}.error{background:#ffe4e4;color:#9f1f1f;border-radius:10px;padding:10px 12px;margin-bottom:14px}.social-button{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:700;text-decoration:none;box-sizing:border-box}.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:13px}.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}code{font-family:Consolas,"Courier New",monospace;background:#f4f0ea;padding:1px 6px;border-radius:6px}.helper{margin:12px 0 0;font-size:13px;color:var(--muted);line-height:1.5}label{display:block;margin:10px 0 6px;font-weight:700}input{width:100%;border:1px solid #e1e4ea;border-radius:8px;padding:10px;box-sizing:border-box;background:#fff}button{width:100%;margin-top:14px;border:none;border-radius:8px;padding:12px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff}button:hover{background:var(--accent-dark)}.links{margin-top:16px;text-align:center}.links a{color:var(--accent-dark);font-weight:700;text-decoration:none}</style></head>
<body>{% include "includes/shared_headers.html" %}<div class="page"><div class="container" data-google-enabled="{% if google_oauth_enabled %}true{% else %}false{% endif %}" data-google-uri="{{ google_redirect_uri_hint|escapejs }}"><h1 id="register-title">Create Administrator Account</h1><p class="subtitle" id="register-subtitle">Create a new administrator account and the system will sign you in automatically.</p>{% if error_message %}<div class="error" id="register-error">{{ error_message }}</div>{% endif %}<a class="social-button" href="{{ google_register_url }}"><svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#EA4335" d="M9 7.2v3.67h5.1c-.22 1.18-.9 2.19-1.92 2.87l3.1 2.4C17.09 14.46 18 11.98 18 9.13c0-.63-.06-1.24-.18-1.83H9z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.16l-3.1-2.4c-.86.58-1.96.92-2.86.92-2.2 0-4.06-1.49-4.72-3.48H1.08v2.48A9 9 0 0 0 9 18z"/><path fill="#4A90E2" d="M4.28 10.88A5.4 5.4 0 0 1 4 9c0-.65.1-1.28.28-1.88V4.64H1.08A9 9 0 0 0 0 9c0 1.45.35 2.82 1.08 4.36l3.2-2.48z"/><path fill="#FBBC05" d="M9 3.58c1.32 0 2.5.46 3.43 1.35l2.57-2.57C13.46.91 11.42 0 9 0A9 9 0 0 0 1.08 4.64l3.2 2.48C4.94 5.07 6.8 3.58 9 3.58z"/></svg><span id="register-google">Continue with Google</span></a><p class="helper" id="register-helper"></p><div class="divider" id="register-divider">or</div><form method="post" action="/admin-panel/register/">{% csrf_token %}<input type="hidden" name="next" value="{{ next_url }}"><label for="reg-username" id="reg-username-label">Username</label><input id="reg-username" type="text" name="username" value="{{ username }}" required><label for="reg-password" id="reg-password-label">Password</label><input id="reg-password" type="password" name="password" required><label for="reg-password-confirm" id="reg-confirm-label">Confirm password</label><input id="reg-password-confirm" type="password" name="password_confirm" required><button type="submit" id="register-submit">Create administrator account</button></form><div class="links"><a href="/admin-panel/?next={{ next_url|urlencode }}" id="register-back">Back to administrator access</a></div></div></div>
<script>(function(){const container=document.querySelector('[data-google-enabled]');const googleEnabled=container.dataset.googleEnabled==='true';const googleUri=container.dataset.googleUri||'';const errorNode=document.getElementById('register-error');const map={'Please enter a username for the new account.':'Вкажіть логін для нового акаунта.','Please enter a password.':'Вкажіть пароль.','The passwords do not match.':'Паролі не збігаються.','An account with this username already exists.':'Акаунт із таким логіном уже існує.','Google sign-in is not configured yet. Create a .env file in the project root and add GOOGLE_OAUTH_CLIENT_ID and GOOGLE_OAUTH_CLIENT_SECRET.':'Вхід через Google ще не налаштований. Створіть файл .env у корені проєкту й додайте GOOGLE_OAUTH_CLIENT_ID та GOOGLE_OAUTH_CLIENT_SECRET.'};const copy={en:{doc:'Create Administrator Account',title:'Create Administrator Account',subtitle:'Create a new administrator account and the system will sign you in automatically.',google:'Continue with Google',divider:'or',username:'Username',password:'Password',confirm:'Confirm password',submit:'Create administrator account',back:'Back to administrator access'},uk:{doc:'Створення акаунта адміністратора',title:'Створити акаунт адміністратора',subtitle:'Створіть новий акаунт адміністратора, і система автоматично виконає вхід.',google:'Продовжити через Google',divider:'або',username:'Логін',password:'Пароль',confirm:'Підтвердження пароля',submit:'Створити акаунт адміністратора',back:'Назад до доступу адміністратора'}};function helper(lang){if(googleEnabled)return lang==='uk'?'Google OAuth увімкнено. Після підтвердження система створить або оновить акаунт адміністратора.<br>Поточний redirect URI: <code>'+googleUri+'</code>':'Google OAuth is enabled. After confirmation, the system will create or update the administrator account.<br>Current redirect URI: <code>'+googleUri+'</code>';return lang==='uk'?'Щоб увімкнути вхід через Google, створіть файл <code>.env</code> у корені проєкту й задайте <code>GOOGLE_OAUTH_CLIENT_ID</code>, <code>GOOGLE_OAUTH_CLIENT_SECRET</code> та за потреби <code>GOOGLE_OAUTH_REDIRECT_URI</code>.':'To enable Google sign-in, create a <code>.env</code> file in the project root and set <code>GOOGLE_OAUTH_CLIENT_ID</code>, <code>GOOGLE_OAUTH_CLIENT_SECRET</code>, and optionally <code>GOOGLE_OAUTH_REDIRECT_URI</code>.';}function applyLanguage(lang){const l=lang==='uk'?'uk':'en';document.title=copy[l].doc;document.getElementById('register-title').textContent=copy[l].title;document.getElementById('register-subtitle').textContent=copy[l].subtitle;document.getElementById('register-google').textContent=copy[l].google;document.getElementById('register-helper').innerHTML=helper(l);document.getElementById('register-divider').textContent=copy[l].divider;document.getElementById('reg-username-label').textContent=copy[l].username;document.getElementById('reg-password-label').textContent=copy[l].password;document.getElementById('reg-confirm-label').textContent=copy[l].confirm;document.getElementById('register-submit').textContent=copy[l].submit;document.getElementById('register-back').textContent=copy[l].back;if(errorNode){const en=errorNode.dataset.enText||errorNode.textContent.trim();errorNode.dataset.enText=en;errorNode.textContent=l==='uk'?(map[en]||en):en;}}document.addEventListener('site-language-change',(e)=>applyLanguage(e.detail.language));applyLanguage(window.siteUiLanguage||document.documentElement.dataset.uiLang||'en');})();</script></body></html>
