<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Password Changed</title><style>:root{--card:#fff;--accent:#c54a2d;--accent-dark:#9a3821;--text:#1b2430;--muted:#5d6773;--shadow:rgba(29,40,59,.12)}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#fff6e9,#e5eef2);font-family:"Trebuchet MS","Lucida Sans Unicode","Lucida Grande",sans-serif;color:var(--text)}.page{min-height:100vh;display:grid;place-items:center;padding:32px 24px 48px;box-sizing:border-box}.container{width:min(520px,100%);background:var(--card);border-radius:16px;padding:28px;box-shadow:0 12px 28px var(--shadow);text-align:center}p{color:var(--muted)}a{display:inline-block;text-decoration:none;background:var(--accent);color:#fff;padding:10px 16px;border-radius:8px;font-weight:700}a:hover{background:var(--accent-dark)}</style></head>
<body>{% include "includes/shared_headers.html" %}<div class="page"><div class="container"><h1 id="complete-title">Password Changed</h1><p id="complete-text">Your password has been updated. You can now sign in with the new one.</p><a href="/admin-panel/" id="complete-link">Back to administrator access</a></div></div>
<script>(function(){const copy={en:{doc:'Password Changed',title:'Password Changed',text:'Your password has been updated. You can now sign in with the new one.',link:'Back to administrator access'},uk:{doc:'Пароль змінено',title:'Пароль змінено',text:'Ваш пароль оновлено. Тепер можна увійти з новим паролем.',link:'Назад до доступу адміністратора'}};function applyLanguage(lang){const l=lang==='uk'?'uk':'en';document.title=copy[l].doc;document.getElementById('complete-title').textContent=copy[l].title;document.getElementById('complete-text').textContent=copy[l].text;document.getElementById('complete-link').textContent=copy[l].link;}document.addEventListener('site-language-change',(e)=>applyLanguage(e.detail.language));applyLanguage(window.siteUiLanguage||document.documentElement.dataset.uiLang||'en');})();</script></body></html>
