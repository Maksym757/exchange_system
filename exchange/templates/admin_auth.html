<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Panel</title><style>body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f2f52,#2369b0);color:#fff;box-sizing:border-box}.page{min-height:calc(100vh - 168px);display:grid;place-items:center;padding:24px;box-sizing:border-box}.container{width:min(760px,100%);background:rgba(255,255,255,.12);border-radius:14px;padding:28px;box-shadow:0 8px 24px rgba(0,0,0,.2)}h1{text-align:center}.subtitle{text-align:center;opacity:.92}.error{background:rgba(255,104,104,.2);border:1px solid rgba(255,165,165,.7);color:#ffe8e8;border-radius:10px;padding:10px 12px;margin-bottom:14px}.grid{display:grid;gap:16px;grid-template-columns:repeat(2,minmax(0,1fr))}.card{background:rgba(255,255,255,.1);border-radius:12px;padding:16px}.card h2{margin:0 0 10px;font-size:20px}label{display:block;margin:10px 0 6px;font-weight:700}input{width:100%;border:none;border-radius:8px;padding:10px;box-sizing:border-box}button{width:100%;margin-top:14px;border:none;border-radius:8px;padding:12px;font-weight:700;cursor:pointer;background:#fff;color:#0f2f52}.links{margin-top:14px;text-align:center}.links a{color:#fff;font-weight:700;text-decoration:none;margin:0 6px}@media (max-width:760px){.grid{grid-template-columns:1fr}}</style></head>
<body>{% include "includes/shared_headers.html" %}<div class="page"><div class="container"><h1 id="auth-title">Admin Panel</h1><p class="subtitle" id="auth-subtitle">Sign in to an existing account or create a new administrator account.</p>{% if error_message %}<div class="error" id="auth-error">{{ error_message }}</div>{% endif %}<div class="grid"><form class="card" method="post" action="/admin-panel/auth/">{% csrf_token %}<input type="hidden" name="action" value="login"><input type="hidden" name="next" value="{{ next_url }}"><h2 id="auth-login-title">Quick login</h2><label for="login-username" id="auth-login-username">Username</label><input id="login-username" type="text" name="username" value="{{ login_username }}" required><label for="login-password" id="auth-login-password">Password</label><input id="login-password" type="password" name="password" required><button type="submit" id="auth-login-submit">Log in to admin</button></form><form class="card" method="post" action="/admin-panel/auth/">{% csrf_token %}<input type="hidden" name="action" value="register"><input type="hidden" name="next" value="{{ next_url }}"><h2 id="auth-register-title">Create admin account</h2><label for="reg-username" id="auth-reg-username">Username</label><input id="reg-username" type="text" name="username" value="{{ register_username }}" required><label for="reg-password" id="auth-reg-password">Password</label><input id="reg-password" type="password" name="password" required><label for="reg-password-confirm" id="auth-reg-confirm">Confirm password</label><input id="reg-password-confirm" type="password" name="password_confirm" required><button type="submit" id="auth-register-submit">Create admin account</button></form></div><div class="links"><a href="/" id="auth-home">Back to homepage</a><a href="/admin/" id="auth-django">Django Admin</a></div></div></div>
<script>(function(){const copy={en:{doc:'Admin Panel',title:'Admin Panel',subtitle:'Sign in to an existing account or create a new administrator account.',loginTitle:'Quick login',username:'Username',password:'Password',loginSubmit:'Log in to admin',registerTitle:'Create admin account',confirm:'Confirm password',registerSubmit:'Create admin account',home:'Back to homepage',django:'Django Admin'},uk:{doc:'Панель адміністратора',title:'Панель адміністратора',subtitle:'Увійдіть в існуючий акаунт або створіть новий акаунт адміністратора.',loginTitle:'Швидкий вхід',username:'Логін',password:'Пароль',loginSubmit:'Увійти в адмінку',registerTitle:'Створити акаунт адміністратора',confirm:'Підтвердження пароля',registerSubmit:'Створити акаунт адміністратора',home:'На головну',django:'Django Admin'}};function applyLanguage(lang){const l=lang==='uk'?'uk':'en';document.title=copy[l].doc;document.getElementById('auth-title').textContent=copy[l].title;document.getElementById('auth-subtitle').textContent=copy[l].subtitle;document.getElementById('auth-login-title').textContent=copy[l].loginTitle;document.getElementById('auth-login-username').textContent=copy[l].username;document.getElementById('auth-login-password').textContent=copy[l].password;document.getElementById('auth-login-submit').textContent=copy[l].loginSubmit;document.getElementById('auth-register-title').textContent=copy[l].registerTitle;document.getElementById('auth-reg-username').textContent=copy[l].username;document.getElementById('auth-reg-password').textContent=copy[l].password;document.getElementById('auth-reg-confirm').textContent=copy[l].confirm;document.getElementById('auth-register-submit').textContent=copy[l].registerSubmit;document.getElementById('auth-home').textContent=copy[l].home;document.getElementById('auth-django').textContent=copy[l].django;}document.addEventListener('site-language-change',(e)=>applyLanguage(e.detail.language));applyLanguage(window.siteUiLanguage||document.documentElement.dataset.uiLang||'en');})();</script></body></html>
